services:
  postgres:
    image: postgres:16
    container_name: saas_postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: saas-app_nextjs-nestjs
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:8
    container_name: saas_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    restart: always

  rabbitmq:
    image: rabbitmq:4-management
    container_name: saas_rabbitmq
    ports:
      - '5672:5672'
      - '15672:15672'
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    restart: always

volumes:
  postgres_data:
  redis_data:
